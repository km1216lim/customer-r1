stage: sft

data:
  # Layer-2 (action-anchored history slicing, no furniture dedup).
  # Same paper hyperparameters as sft_base.yaml — only the data paths differ.
  # See docs/compression_design.md §3.7 for why L2 is the main compressed
  # variant (vs L1 / L1L2).
  train_path: data/processed_L2/train.parquet
  val_path: data/processed_L2/test.parquet
  packed: true
  bucket_lengths: [8192, 16384, 32768, 65536]

optim:
  lr: 1.0e-5
  weight_decay: 0.0
  warmup_steps: 150
  lr_scheduler: cosine
  optimizer: adamw_torch
  max_grad_norm: 1.0

train:
  total_steps: 2000
  batch_size: 64
  save_every_n_steps: 200
  eval_every_n_steps: 200
  log_every_n_steps: 10
  seed: 42

checkpoint:
  save_format: hf_safetensors
  save_optimizer_state: true
  resume_from: null

logging:
  project: customer-r1
  run_name_prefix: sft-l2
  use_wandb: true
