stage: sft

data:
  train_path: data/processed/sft_train.parquet
  val_path: data/processed/sft_val.parquet
  packed: true
  bucket_lengths: [8192, 16384, 32768, 65536]

optim:
  lr: 1.0e-5
  weight_decay: 0.0
  warmup_ratio: 0.03
  lr_scheduler: cosine
  optimizer: adamw_torch
  max_grad_norm: 1.0

train:
  num_epochs: 2
  save_every_n_steps: 200
  eval_every_n_steps: 200
  log_every_n_steps: 10
  seed: 42

checkpoint:
  save_format: hf_safetensors
  save_optimizer_state: true
  resume_from: null

logging:
  project: customer-r1
  run_name_prefix: sft
  use_wandb: true
