stage: grpo

data:
  # Same parquet as SFT — GRPO uses prompt_text for rollout and action_gt
  # (canonical internal JSON with click_type) for the verifiable reward.
  train_path: data/processed/train.parquet
  val_path: data/processed/test.parquet
  packed: false
  bucket_lengths: [16384, 32768, 65536]

actor:
  init_from_ckpt: ckpt/sft/latest_hf
  lr: 5.0e-7
  weight_decay: 0.0
  warmup_steps: 100
  lr_scheduler: constant
  optimizer: adamw_torch
  max_grad_norm: 1.0

ref_model:
  init_from_ckpt: ckpt/sft/latest_hf
  freeze: true

grpo:
  # KL/clip/group_size NOT specified in the Customer-R1 paper — defaults below
  # are standard GRPO values used in DeepSeek-R1 reproductions. Tune later.
  kl_coef: 0.001
  clip_range: 0.2
  group_size: 8
  rollout_temperature: 1.0
  rollout_top_p: 1.0
  reward_normalization: group_std
  loss_type: dr_grpo

train:
  # Customer-R1 paper §4.3: 2 epochs over the train split with batch size 64.
  num_epochs: 2
  batch_size: 64
  save_every_n_steps: 100
  eval_every_n_steps: 100
  log_every_n_steps: 5
  seed: 42

reward:
  # Customer-R1 difficulty-aware weights (paper §3.2).
  # See train/reward.py:RewardConfig — these fields map 1:1.
  input_weight: 2000.0
  hard_click_weight: 1000.0
  product_option_weight: 10.0
  review_search_weight: 1.0
  terminate_weight: 1.0
  wrong_click_penalty: -1.0        # SFT+RL setting; flip to 0 for RL-only via `rl_only: true`
  wrong_non_click_weight: 0.0      # unspecified by paper; default 0
  format_bonus: 0.1                # paper says "binary"; magnitude is our choice
  rl_only: false                   # set true to reproduce the RL-only ablation row

checkpoint:
  save_format: hf_safetensors
  save_optimizer_state: false

logging:
  project: customer-r1
  run_name_prefix: grpo
  use_wandb: false
