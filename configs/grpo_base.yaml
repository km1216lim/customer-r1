stage: grpo

data:
  train_path: data/processed/grpo_train.parquet
  val_path: data/processed/grpo_val.parquet
  packed: false
  bucket_lengths: [16384, 32768, 65536]

actor:
  init_from_ckpt: ckpt/sft/latest_hf
  lr: 5.0e-7
  weight_decay: 0.0
  warmup_steps: 100
  lr_scheduler: constant
  optimizer: adamw_torch
  max_grad_norm: 1.0

ref_model:
  init_from_ckpt: ckpt/sft/latest_hf
  freeze: true

grpo:
  kl_coef: 0.001
  clip_range: 0.2
  group_size: 8
  rollout_temperature: 1.0
  rollout_top_p: 1.0
  reward_normalization: group_std
  loss_type: dr_grpo
  format_reward_weight: 0.1

train:
  total_steps: 2000
  save_every_n_steps: 100
  eval_every_n_steps: 100
  log_every_n_steps: 5
  seed: 42

reward:
  type: action_correctness
  action_type_weight: 1.0
  attribute_match_weight: 1.0
  format_bonus: 0.1

checkpoint:
  save_format: hf_safetensors
  save_optimizer_state: false

logging:
  project: customer-r1
  run_name_prefix: grpo
  use_wandb: true
